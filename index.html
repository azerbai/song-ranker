<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discography Sorter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between selection:bg-violet-500 selection:text-white">

    <div id="root" class="w-full flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [screen, setScreen] = useState(1); // 1: Search, 2: Filter, 3: Matchup, 4: Results
            const [artistQuery, setArtistQuery] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [loadingStatus, setLoadingStatus] = useState("");
            const [errorMessage, setErrorMessage] = useState("");
            
            // Separated content states
            const [selectedArtist, setSelectedArtist] = useState(null); // { name, albums: [], singles: [] }
            const [selectedCollections, setSelectedCollections] = useState([]); // Array of checked titles
            const [activeTab, setActiveTab] = useState("albums"); // "albums" | "singles"

            // --- SCORE-BASED PAIRWISE SORTING STATE ---
            const [trackPool, setTrackPool] = useState([]); // Exact inventory array containing scores
            const [matchHistory, setMatchHistory] = useState([]); 
            const [matchIndex, setMatchIndex] = useState(0);
            const [totalMatches, setTotalMatches] = useState(0);
            const [generatedPairs, setGeneratedPairs] = useState([]);

            // --- DATA ENGINE ---
            const fetchArtistDiscography = async (e) => {
                if (e) e.preventDefault();
                if (!artistQuery.trim()) return;

                setIsLoading(true);
                setErrorMessage("");
                setLoadingStatus("Searching for artist...");

                try {
                    const artistUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(artistQuery)}&entity=musicArtist&limit=1`;
                    const artistResponse = await fetch(artistUrl);
                    const artistData = await artistResponse.json();

                    if (!artistData.results || artistData.results.length === 0) {
                        throw new Error(`Could not find an artist matching "${artistQuery}"`);
                    }

                    const targetArtist = artistData.results[0];
                    const artistId = targetArtist.artistId;
                    
                    setLoadingStatus(`Loading catalog groups...`);

                    const albumsUrl = `https://itunes.apple.com/lookup?id=${artistId}&entity=album&limit=200`;
                    const albumsResponse = await fetch(albumsUrl);
                    const albumsData = await albumsResponse.json();

                    const rawCollections = albumsData.results.filter(item => 
                        item.wrapperType === 'collection' && 
                        !item.collectionName.toLowerCase().includes("tribute") &&
                        !item.collectionName.toLowerCase().includes("karaoke")
                    );

                    if (rawCollections.length === 0) {
                        throw new Error("No musical projects were found for this artist.");
                    }

                    const uniqueAlbums = [];
                    const uniqueSingles = [];
                    const seenNames = new Set();
                    
                    rawCollections.forEach(item => {
                        const baseName = item.collectionName.replace(/\s*\(?(Explicit|Clean|Deluxe|Super Deluxe|Expanded|Bonus Track)\)?\s*/gi, "").trim().toLowerCase();
                        if (!seenNames.has(baseName)) {
                            seenNames.add(baseName);
                            
                            // Categorize based on track counts and names
                            const isSingleOrEP = item.trackCount <= 6 || 
                                                 item.collectionName.toLowerCase().includes("single") || 
                                                 item.collectionName.toLowerCase().includes("- ep");
                            
                            if (isSingleOrEP) {
                                uniqueSingles.push(item);
                            } else {
                                uniqueAlbums.push(item);
                            }
                        }
                    });

                    const sortByDate = (a, b) => new Date(b.releaseDate) - new Date(a.releaseDate);
                    uniqueAlbums.sort(sortByDate);
                    uniqueSingles.sort(sortByDate);

                    setLoadingStatus(`Assembling tracklists...`);
                    
                    const fetchTracksForGroup = async (list) => {
                        const promises = list.map(async (album) => {
                            try {
                                const trackUrl = `https://itunes.apple.com/lookup?id=${album.collectionId}&entity=song`;
                                const res = await fetch(trackUrl);
                                const data = await res.json();
                                
                                const tracks = data.results
                                    .filter(item => item.wrapperType === 'track' && item.kind === 'song')
                                    .sort((a, b) => a.trackNumber - b.trackNumber)
                                    .map(item => item.trackName);

                                return {
                                    title: `${album.collectionName} (${new Date(album.releaseDate).getFullYear()})`,
                                    tracks: tracks
                                };
                            } catch (err) {
                                return null;
                            }
                        });
                        const results = await Promise.all(promises);
                        return results.filter(a => a !== null && a.tracks.length > 0);
                    };

                    const finalAlbums = await fetchTracksForGroup(uniqueAlbums);
                    const finalSingles = await fetchTracksForGroup(uniqueSingles);

                    setSelectedArtist({
                        name: targetArtist.artistName,
                        albums: finalAlbums,
                        singles: finalSingles
                    });
                    
                    // Pre-select the top 3 most recent albums by default
                    setSelectedCollections(finalAlbums.slice(0, 3).map(a => a.title));
                    setActiveTab(finalAlbums.length > 0 ? "albums" : "singles");
                    setScreen(2);

                } catch (error) {
                    setErrorMessage(error.message || "An error occurred while fetching the discography data.");
                } finally {
                    setIsLoading(false);
                    setLoadingStatus("");
                }
            };

            const toggleCollection = (title) => {
                if (selectedCollections.includes(title)) {
                    setSelectedCollections(selectedCollections.filter(c => c !== title));
                } else {
                    setSelectedCollections([...selectedCollections, title]);
                }
            };

            // --- HIGHSPEED PAIRWISE TRACK GENERATOR ---
            const startSorting = () => {
                let items = [];
                const allSourceGroups = [...selectedArtist.albums, ...selectedArtist.singles];
                
                allSourceGroups.forEach(group => {
                    if (selectedCollections.includes(group.title)) {
                        group.tracks.forEach(trackName => {
                            if (!items.some(t => t.name.toLowerCase() === trackName.toLowerCase())) {
                                items.push({
                                    id: Math.random().toString(36).substr(2, 9),
                                    name: trackName,
                                    album: group.title,
                                    score: 0,
                                    matchCount: 0
                                });
                            }
                        });
                    }
                });

                if (items.length < 2) {
                    alert("Please select categories containing at least 2 unique tracks.");
                    return;
                }

                // Shuffle the songs
                items.sort(() => Math.random() - 0.5);

                // Efficient Linear Pair Generation Pass Loop
                // Rather than n^2 comparisons, we pair elements efficiently to scale with larger catalogs
                let pairs = [];
                const steps = items.length <= 30 ? 3 : items.length <= 60 ? 2 : 1; 

                for (let step = 0; step < steps; step++) {
                    let shuffled = [...items].sort(() => Math.random() - 0.5);
                    for (let i = 0; i < shuffled.length - 1; i += 2) {
                        pairs.push([shuffled[i].id, shuffled[i + 1].id]);
                    }
                }

                setTrackPool(items);
                setGeneratedPairs(pairs);
                setMatchIndex(0);
                setTotalMatches(pairs.length);
                setMatchHistory([]);
                setScreen(3);
            };

            const currentMatchTracks = useMemo(() => {
                if (screen !== 3 || matchIndex >= generatedPairs.length) return [null, null];
                const [leftId, rightId] = generatedPairs[matchIndex];
                const leftTrack = trackPool.find(t => t.id === leftId);
                const rightTrack = trackPool.find(t => t.id === rightId);
                return [leftTrack, rightTrack];
            }, [screen, matchIndex, generatedPairs, trackPool]);

            const handleVote = (winnerCase) => {
                // Save state to snapshot stack for historical undos
                const historySnapshot = {
                    trackPool: JSON.parse(JSON.stringify(trackPool)),
                    matchIndex
                };
                setMatchHistory(prev => [...prev, historySnapshot]);

                const [leftId, rightId] = generatedPairs[matchIndex];
                const updatedPool = trackPool.map(track => {
                    if (track.id === leftId || track.id === rightId) {
                        const isLeft = track.id === leftId;
                        let pointAward = 0;

                        if (winnerCase === 'left') pointAward = isLeft ? 2 : 0;
                        else if (winnerCase === 'right') pointAward = isLeft ? 0 : 2;
                        else pointAward = 1; // Direct point distribution for skip/tie matches

                        return {
                            ...track,
                            score: track.score + pointAward,
                            matchCount: track.matchCount + 1
                        };
                    }
                    return track;
                });

                setTrackPool(updatedPool);
                
                if (matchIndex + 1 >= generatedPairs.length) {
                    setScreen(4);
                } else {
                    setMatchIndex(prev => prev + 1);
                }
            };

            const handleUndo = () => {
                if (matchHistory.length === 0) return;
                const previous = matchHistory[matchHistory.length - 1];
                setMatchHistory(prev => prev.slice(0, -1));
                setTrackPool(previous.trackPool);
                setMatchIndex(previous.matchIndex);
            };

            const progressPercent = useMemo(() => {
                if (totalMatches === 0) return 0;
                return Math.min(Math.floor((matchIndex / totalMatches) * 100), 100);
            }, [matchIndex, totalMatches]);

            const sortedResults = useMemo(() => {
                return [...trackPool].sort((a, b) => b.score - a.score);
            }, [trackPool]);

            const resetApp = () => {
                setArtistQuery("");
                setSelectedArtist(null);
                setSelectedCollections([]);
                setTrackPool([]);
                setMatchHistory([]);
                setScreen(1);
                setErrorMessage("");
            };

            return (
                <div class="flex flex-col flex-grow w-full max-w-4xl mx-auto px-4 py-8 justify-center">
                    
                    {/* --- HEADER --- */}
                    <header class="text-center mb-8 flex flex-col items-center justify-center">
                        <div class="flex items-center gap-3 cursor-pointer" onClick={resetApp}>
                            <div class="bg-gradient-to-tr from-violet-600 to-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/20">
                                <i class="fa-solid fa-compact-disc text-2xl text-white"></i>
                            </div>
                            <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
                                Discography Sorter
                            </h1>
                        </div>
                        <p class="text-xs text-gray-400 mt-2 tracking-wide uppercase font-medium">Rank your favorite music track by track</p>
                    </header>

                    {/* --- SCREEN 1: SEARCH --- */}
                    {screen === 1 && (
                        <div class="bg-gray-900/60 backdrop-blur-xl border border-gray-800/80 rounded-3xl p-8 shadow-2xl max-w-xl w-full mx-auto">
                            <h2 class="text-2xl font-bold text-center text-white mb-2">Search for an Artist</h2>
                            <p class="text-gray-400 text-sm text-center mb-8">Enter any artist name to automatically pull their complete album history and tracklists.</p>
                            
                            <form onSubmit={fetchArtistDiscography} class="space-y-6">
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                                        {isLoading ? <i class="fa-solid fa-circle-notch animate-spin text-violet-500"></i> : <i class="fa-solid fa-magnifying-glass"></i>}
                                    </div>
                                    <input 
                                        type="text"
                                        disabled={isLoading}
                                        placeholder="Enter artist name (e.g., Drake, Lana Del Rey, Radiohead...)"
                                        class="w-full bg-gray-950 border border-gray-800 text-white rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all placeholder:text-gray-600 shadow-inner disabled:opacity-60"
                                        value={artistQuery}
                                        onChange={(e) => setArtistQuery(e.target.value)}
                                    />
                                </div>

                                {isLoading && (
                                    <div class="text-center py-2 text-sm text-violet-400 font-medium animate-pulse">
                                        <i class="fa-solid fa-database mr-2"></i> {loadingStatus}
                                    </div>
                                )}

                                {errorMessage && (
                                    <div class="bg-red-950/40 border border-red-900/50 text-red-400 text-xs p-3 rounded-lg flex items-center gap-2">
                                        <i class="fa-solid fa-triangle-exclamation shrink-0"></i>
                                        <span>{errorMessage}</span>
                                    </div>
                                )}

                                <button 
                                    type="submit"
                                    disabled={isLoading || !artistQuery.trim()}
                                    class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 disabled:from-gray-800 disabled:to-gray-800 text-white font-semibold py-4 rounded-xl transition shadow-lg shadow-indigo-600/20 active:scale-[0.99] disabled:cursor-not-allowed flex items-center justify-center gap-2"
                                >
                                    {isLoading ? "Loading Catalog..." : "Load Discography"} <i class="fa-solid fa-arrow-right text-sm"></i>
                                </button>
                            </form>
                        </div>
                    )}

                    {/* --- SCREEN 2: FILTER ARCHITECTURE WITH SUB-TABS --- */}
                    {screen === 2 && selectedArtist && (
                        <div class="bg-gray-900/60 backdrop-blur-xl border border-gray-800/80 rounded-3xl p-8 shadow-2xl max-w-2xl w-full mx-auto">
                            
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-4 border-b border-gray-800/60">
                                <div class="flex items-center gap-4">
                                    <button onClick={() => setScreen(1)} class="text-gray-400 hover:text-white bg-gray-800/50 p-2.5 rounded-lg border border-gray-700/50 transition">
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <div>
                                        <h2 class="text-2xl font-bold text-white">{selectedArtist.name}</h2>
                                        <p class="text-gray-400 text-xs uppercase tracking-wider font-semibold">Select items to include</p>
                                    </div>
                                </div>
                                
                                {/* Sub-Tab Navigation Bar */}
                                <div class="flex bg-gray-950 p-1 rounded-xl border border-gray-800/80 self-start sm:self-auto">
                                    <button 
                                        onClick={() => setActiveTab("albums")}
                                        class={`px-4 py-2 rounded-lg text-xs font-semibold transition ${activeTab === 'albums' ? 'bg-violet-600 text-white' : 'text-gray-400 hover:text-gray-200'}`}
                                    >
                                        Albums ({selectedArtist.albums.length})
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab("singles")}
                                        class={`px-4 py-2 rounded-lg text-xs font-semibold transition ${activeTab === 'singles' ? 'bg-violet-600 text-white' : 'text-gray-400 hover:text-gray-200'}`}
                                    >
                                        Singles & EPs ({selectedArtist.singles.length})
                                    </button>
                                </div>
                            </div>

                            <p class="text-sm text-gray-400 mb-6">
                                {activeTab === 'albums' 
                                    ? "Full studio releases and major LPs containing 7 or more tracks."
                                    : "Standalone track releases, remixes, and brief extended-play projects."}
                            </p>

                            {/* Dynamic Target Inventory Render List */}
                            <div class="space-y-3 mb-8 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                                {selectedArtist[activeTab].map((group) => {
                                    const isChecked = selectedCollections.includes(group.title);
                                    return (
                                        <div 
                                            key={group.title}
                                            onClick={() => toggleCollection(group.title)}
                                            class={`flex items-center justify-between p-4 rounded-xl border cursor-pointer transition select-none ${
                                                isChecked 
                                                    ? 'bg-violet-950/20 border-violet-500/40 text-white' 
                                                    : 'bg-gray-950/40 border-gray-800/80 text-gray-400 hover:border-gray-700'
                                            }`}
                                        >
                                            <div class="flex items-center gap-3 min-w-0 pr-2">
                                                <i class={`fa-solid ${activeTab === 'albums' ? 'fa-compact-disc' : 'fa-record-vinyl'} shrink-0 ${isChecked ? 'text-violet-400' : 'text-gray-600'}`}></i>
                                                <span class="font-medium text-sm truncate">{group.title}</span>
                                            </div>
                                            <div class="flex items-center gap-3 shrink-0">
                                                <span class="text-xs bg-gray-800 text-gray-400 px-2.5 py-1 rounded-md border border-gray-700/40">{group.tracks.length} songs</span>
                                                <div class={`w-5 h-5 rounded-md flex items-center justify-center border transition ${
                                                    isChecked ? 'bg-violet-600 border-violet-500 text-white' : 'border-gray-600'
                                                }`}>
                                                    {isChecked && <i class="fa-solid fa-check text-[10px]"></i>}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                                {selectedArtist[activeTab].length === 0 && (
                                    <div class="text-center py-12 text-sm text-gray-500">No entries identified in this category.</div>
                                )}
                            </div>

                            <button 
                                onClick={startSorting}
                                class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white font-semibold py-4 rounded-xl transition shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2"
                            >
                                <i class="fa-solid fa-play text-xs"></i> Start Sorting Selected Songs
                            </button>
                        </div>
                    )}

                    {/* --- SCREEN 3: HIGH STABILITY MATCHUP ENGINE --- */}
                    {screen === 3 && currentMatchTracks[0] && currentMatchTracks[1] && (
                        <div class="w-full space-y-6 max-w-3xl mx-auto">
                            
                            <div class="bg-gray-900/40 backdrop-blur-md border border-gray-800/80 rounded-2xl p-4 sm:p-5 shadow-xl">
                                <div class="flex justify-between items-center text-xs sm:text-sm font-semibold mb-2">
                                    <span class="text-violet-400">Sorting Progress</span>
                                    <span class="text-gray-400">Match Choice: {matchIndex + 1} / {totalMatches} ({progressPercent}%)</span>
                                </div>
                                <div class="w-full bg-gray-950 h-2.5 rounded-full overflow-hidden border border-gray-800/40 p-0.5">
                                    <div 
                                        class="bg-gradient-to-r from-violet-500 to-indigo-500 h-full rounded-full transition-all duration-300 ease-out"
                                        style={{ width: `${progressPercent}%` }}
                                    ></div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                <div 
                                    onClick={() => handleVote('left')}
                                    class="group bg-gradient-to-b from-gray-900 via-gray-900 to-gray-950 hover:from-gray-900 hover:to-gray-900 border border-gray-800 hover:border-violet-500/50 rounded-2xl p-6 sm:p-8 flex flex-col justify-between items-center text-center cursor-pointer transform hover:-translate-y-1 transition-all duration-300 shadow-xl relative overflow-hidden"
                                >
                                    <div class="absolute -inset-px bg-gradient-to-r from-transparent via-violet-500/10 to-transparent opacity-0 group-hover:opacity-100 transition duration-500 rounded-2xl pointer-events-none"></div>
                                    <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-gray-950 flex items-center justify-center border border-gray-800 text-gray-500 group-hover:text-violet-400 group-hover:border-violet-500/30 transition shadow-inner mb-6">
                                        <i class="fa-solid fa-music text-xl sm:text-2xl group-hover:scale-110 transition duration-300"></i>
                                    </div>
                                    <div class="space-y-2 flex-grow flex flex-col justify-center">
                                        <h3 class="text-lg sm:text-xl font-bold tracking-tight text-white px-2 group-hover:text-violet-300 transition">
                                            {currentMatchTracks[0].name}
                                        </h3>
                                        <p class="text-xs text-gray-500 font-medium px-4 line-clamp-2">
                                            {currentMatchTracks[0].album}
                                        </p>
                                    </div>
                                    <div class="mt-8 w-full bg-gray-950/60 border border-gray-800/80 rounded-xl py-2.5 text-xs font-semibold text-gray-400 group-hover:text-white group-hover:bg-violet-600 transition duration-300">
                                        Select Track
                                    </div>
                                </div>

                                <div 
                                    onClick={() => handleVote('right')}
                                    class="group bg-gradient-to-b from-gray-900 via-gray-900 to-gray-950 hover:from-gray-900 hover:to-gray-900 border border-gray-800 hover:border-violet-500/50 rounded-2xl p-6 sm:p-8 flex flex-col justify-between items-center text-center cursor-pointer transform hover:-translate-y-1 transition-all duration-300 shadow-xl relative overflow-hidden"
                                >
                                    <div class="absolute -inset-px bg-gradient-to-r from-transparent via-violet-500/10 to-transparent opacity-0 group-hover:opacity-100 transition duration-500 rounded-2xl pointer-events-none"></div>
                                    <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-gray-950 flex items-center justify-center border border-gray-800 text-gray-500 group-hover:text-violet-400 group-hover:border-violet-500/30 transition shadow-inner mb-6">
                                        <i class="fa-solid fa-music text-xl sm:text-2xl group-hover:scale-110 transition duration-300"></i>
                                    </div>
                                    <div class="space-y-2 flex-grow flex flex-col justify-center">
                                        <h3 class="text-lg sm:text-xl font-bold tracking-tight text-white px-2 group-hover:text-violet-300 transition">
                                            {currentMatchTracks[1].name}
                                        </h3>
                                        <p class="text-xs text-gray-500 font-medium px-4 line-clamp-2">
                                            {currentMatchTracks[1].album}
                                        </p>
                                    </div>
                                    <div class="mt-8 w-full bg-gray-950/60 border border-gray-800/80 rounded-xl py-2.5 text-xs font-semibold text-gray-400 group-hover:text-white group-hover:bg-violet-600 transition duration-300">
                                        Select Track
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-wrap gap-3 justify-between items-center pt-2">
                                <button 
                                    onClick={handleUndo}
                                    disabled={matchHistory.length === 0}
                                    class={`flex items-center gap-2 px-5 py-3 rounded-xl border text-sm font-semibold transition ${
                                        matchHistory.length === 0 
                                            ? 'bg-gray-950/20 border-gray-900 text-gray-600 cursor-not-allowed' 
                                            : 'bg-gray-900/60 border-gray-800 text-gray-300 hover:text-white hover:bg-gray-800'
                                    }`}
                                >
                                    <i class="fa-solid fa-rotate-left text-xs"></i> Undo Last Choice
                                </button>

                                <div class="flex gap-3">
                                    <button 
                                        onClick={() => handleVote('tie')}
                                        class="bg-gray-900/60 border border-gray-800 text-gray-300 hover:text-white hover:bg-gray-800 px-5 py-3 rounded-xl text-sm font-semibold transition flex items-center gap-2"
                                    >
                                        <i class="fa-solid fa-equals text-xs"></i> Tie / Skip
                                    </button>

                                    <button 
                                        onClick={() => setScreen(4)}
                                        class="bg-emerald-950/20 hover:bg-emerald-900/30 border border-emerald-800/40 text-emerald-400 hover:text-emerald-300 px-5 py-3 rounded-xl text-sm font-semibold transition flex items-center gap-2"
                                    >
                                        View Rankings Early <i class="fa-solid fa-flag-checkered text-xs"></i>
                                    </button>
                                </div>
                            </div>

                        </div>
                    )}

                    {/* --- SCREEN 4: COMPLETELY UNTRUNCATED RESULTS LEADERBOARD --- */}
                    {screen === 4 && (
                        <div class="bg-gray-900/60 backdrop-blur-xl border border-gray-800/80 rounded-3xl p-6 sm:p-8 shadow-2xl w-full max-w-2xl mx-auto">
                            
                            <div class="text-center mb-8">
                                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-950 text-emerald-400 border border-emerald-800/50 mb-3 shadow-lg shadow-emerald-900/20">
                                    <i class="fa-solid fa-crown text-xl"></i>
                                </div>
                                <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Your Ranked Results</h2>
                                <p class="text-gray-400 text-sm mt-1">Your complete personalized song hierarchy containing all items</p>
                            </div>

                            <div class="space-y-2 max-h-[420px] overflow-y-auto pr-2 mb-8 custom-scrollbar">
                                {sortedResults.map((song, index) => {
                                    const rankBadgeColor = 
                                        index === 0 ? 'bg-amber-500/10 text-amber-400 border-amber-500/30' :
                                        index === 1 ? 'bg-slate-300/10 text-slate-300 border-slate-400/30' :
                                        index === 2 ? 'bg-amber-700/10 text-amber-600 border-amber-800/30' :
                                        'bg-gray-950 text-gray-500 border-gray-800/60';

                                    return (
                                        <div 
                                            key={song.id || index}
                                            class={`flex items-center justify-between p-3.5 rounded-xl border transition ${
                                                index === 0 
                                                    ? 'bg-gradient-to-r from-amber-500/5 via-transparent to-transparent border-amber-500/20' 
                                                    : 'bg-gray-950/40 border-gray-800/60'
                                            }`}
                                        >
                                            <div class="flex items-center gap-3.5 min-w-0 pr-2">
                                                <div class={`w-8 h-7 rounded-lg flex items-center justify-center font-bold text-xs border shrink-0 ${rankBadgeColor}`}>
                                                    #{index + 1}
                                                </div>
                                                <div class="min-w-0">
                                                    <h4 class="font-bold text-sm text-gray-100 truncate">
                                                        {song.name}
                                                    </h4>
                                                    <p class="text-xs text-gray-500 truncate mt-0.5">
                                                        {song.album}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <button 
                                onClick={resetApp}
                                class="w-full bg-gray-800 hover:bg-gray-700 text-white font-semibold py-4 rounded-xl transition flex items-center justify-center gap-2 border border-gray-700/60"
                            >
                                <i class="fa-solid fa-arrow-rotate-right text-xs"></i> Sort Another Discography
                            </button>
                        </div>
                    )}

                    {/* --- FOOTER --- */}
                    <footer class="mt-12 text-center text-[11px] font-semibold text-gray-600 tracking-wider uppercase">
                        Powered by client-side merge sort arrays
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
